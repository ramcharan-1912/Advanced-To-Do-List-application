<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced To Do List</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
transition:0.3s;
}

.container{
background:white;
padding:25px;
width:500px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

.input-section{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

input, select{
padding:7px;
}

button{
padding:7px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{
background:green;
color:white;
}

.search{
width:100%;
margin-bottom:10px;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f3f3f3;
padding:10px;
margin-bottom:8px;
border-radius:5px;
display:flex;
justify-content:space-between;
align-items:center;
}

.completed{
text-decoration:line-through;
color:gray;
}

.high{border-left:5px solid red;}
.medium{border-left:5px solid orange;}
.low{border-left:5px solid green;}

.actions button{
margin-left:5px;
}

.delete{background:red;color:white;}
.edit{background:orange;color:white;}

.stats{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:10px;
}

.progress-bar{
width:100%;
background:#ddd;
height:10px;
border-radius:5px;
overflow:hidden;
margin-bottom:15px;
}

#progress{
height:100%;
background:green;
width:0%;
transition:0.4s;
}

.dark{
background:#1e1e1e;
color:white;
}

.dark .container{
background:#2c2c2c;
}

.dark li{
background:#444;
}

</style>
</head>

<body>

<div class="container">

<h2>📝 Advanced To Do List</h2>

<div class="stats">
<p>Total: <span id="total">0</span></p>
<p>Completed: <span id="completed">0</span></p>
</div>

<div class="progress-bar">
<div id="progress"></div>
</div>

<input type="text" id="search" class="search" placeholder="Search task..." onkeyup="searchTask()">

<div class="input-section">

<input type="text" id="taskInput" placeholder="Enter task">

<select id="priority">
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>

<input type="date" id="dueDate">

<button class="add" onclick="addTask()">Add</button>

</div>

<div style="margin-bottom:10px;">
<button onclick="sortPriority()">Sort Priority</button>
<button onclick="clearCompleted()">Clear Completed</button>
<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks(list=tasks){

let taskList=document.getElementById("taskList");
taskList.innerHTML="";

list.forEach((task,index)=>{

let li=document.createElement("li");
li.classList.add(task.priority);

let span=document.createElement("span");
span.innerHTML="📌 "+task.text+" | 📅 "+task.date;

if(task.completed){
span.classList.add("completed");
}

span.onclick=()=>{
task.completed=!task.completed;
saveTasks();
renderTasks();
};

let actions=document.createElement("div");
actions.className="actions";

let edit=document.createElement("button");
edit.textContent="Edit";
edit.className="edit";

edit.onclick=()=>{
let newTask=prompt("Edit task",task.text);
if(newTask){
tasks[index].text=newTask;
saveTasks();
renderTasks();
}
};

let del=document.createElement("button");
del.textContent="Delete";
del.className="delete";

del.onclick=()=>{
tasks.splice(index,1);
saveTasks();
renderTasks();
};

actions.appendChild(edit);
actions.appendChild(del);

li.appendChild(span);
li.appendChild(actions);

taskList.appendChild(li);

});

updateStats();

}

function addTask(){

let text=document.getElementById("taskInput").value.trim();
let priority=document.getElementById("priority").value;
let date=document.getElementById("dueDate").value;

if(text===""){
alert("Enter task");
return;
}

tasks.push({
text:text,
priority:priority,
date:date,
completed:false
});

document.getElementById("taskInput").value="";
document.getElementById("dueDate").value="";

saveTasks();
renderTasks();

}

function searchTask(){

let keyword=document.getElementById("search").value.toLowerCase();

let filtered=tasks.filter(task=>
task.text.toLowerCase().includes(keyword)
);

renderTasks(filtered);

}

function updateStats(){

let total=tasks.length;
let completed=tasks.filter(t=>t.completed).length;

document.getElementById("total").innerText=total;
document.getElementById("completed").innerText=completed;

let percent=total ? (completed/total)*100 : 0;
document.getElementById("progress").style.width=percent+"%";

}

function sortPriority(){

let order={high:1,medium:2,low:3};

tasks.sort((a,b)=>order[a.priority]-order[b.priority]);

saveTasks();
renderTasks();

}

function clearCompleted(){

tasks=tasks.filter(task=>!task.completed);

saveTasks();
renderTasks();

}

function toggleDarkMode(){
document.body.classList.toggle("dark");
}

document.getElementById("taskInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
addTask();
}
});

renderTasks();

</script>

</body>
</html>
